<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owl — AI Lineage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f172a;
    --muted: #64748b;
    --line: #e6e9f0;
    --bg: #f4f6fb;
    --card: #ffffff;

    --rd: #2f6df0;    --rd-soft: #eef4ff;   --rd-line: #d6e4ff;
    --mkt: #7c4ad6;   --mkt-soft: #f4eefe;  --mkt-line: #e4d6fb;

    --shadow: 0 1px 3px rgba(15,23,42,.06), 0 1px 2px rgba(15,23,42,.04);
    --shadow-lg: 0 12px 30px rgba(16,24,40,.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding: 44px 32px;
  }
  .wrap { max-width: 1320px; margin: 0 auto; }

  h1 { text-align: center; font-size: 30px; font-weight: 800; letter-spacing: -0.02em; }
  h1 .mark {
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .lede { text-align: center; color: var(--muted); font-size: 16px; font-weight: 500; margin: 6px 0 34px; }

  /* stage headers */
  .stages, .row {
    display: grid;
    grid-template-columns: 104px 1fr 44px 1fr 44px 1fr 44px 1fr;
    gap: 14px;
    align-items: center;
  }
  .stages { margin-bottom: 14px; }
  .stages .sh {
    text-align: center;
    font-size: 11.5px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted);
  }
  .stages .sh.kpi { color: var(--ink); }
  .stages .spacer { grid-column: span 1; }

  .row { margin-bottom: 18px; }

  /* department tab */
  .dept {
    align-self: stretch;
    border-radius: 16px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px; color: #fff;
    padding: 18px 8px;
  }
  .dept .ico { font-size: 24px; line-height: 1; }
  .dept .name { font-size: 15px; font-weight: 800; letter-spacing: -0.01em; line-height: 1.1; text-align: center; }
  .row.rd  .dept { background: var(--rd); }
  .row.mkt .dept { background: var(--mkt); }

  /* node card */
  .node {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 18px 14px;
    min-height: 116px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
    text-align: center;
    transition: transform .2s ease, box-shadow .2s ease;
  }
  .node:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
  .node .chip {
    width: 46px; height: 46px; border-radius: 13px;
    display: grid; place-items: center; flex-shrink: 0;
  }
  .node .chip img { width: 30px; height: 30px; object-fit: contain; }
  .node .chip svg { width: 26px; height: 26px; }
  .node .label { font-size: 14.5px; font-weight: 700; line-height: 1.25; }

  .row.rd  .chip { background: var(--rd-soft); }
  .row.mkt .chip { background: var(--mkt-soft); }
  .row.rd  .chip svg { color: var(--rd); }
  .row.mkt .chip svg { color: var(--mkt); }

  /* KPI node = the punchline */
  .node.kpi { border-width: 2px; }
  .row.rd  .node.kpi { background: var(--rd-soft);  border-color: var(--rd); }
  .row.mkt .node.kpi { background: var(--mkt-soft); border-color: var(--mkt); }
  .node.kpi .chip { color: #fff; }
  .row.rd  .node.kpi .chip { background: var(--rd); }
  .row.mkt .node.kpi .chip { background: var(--mkt); }
  .node.kpi .chip svg { color: #fff; }
  .node.kpi .tag {
    font-size: 10px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 3px 9px; border-radius: 999px; color: #fff;
  }
  .row.rd  .node.kpi .tag { background: var(--rd); }
  .row.mkt .node.kpi .tag { background: var(--mkt); }

  /* connector */
  .arrow { display: flex; align-items: center; justify-content: center; }
  .arrow svg { width: 40px; height: 22px; }
  .row.rd  .arrow svg { color: var(--rd); }
  .row.mkt .arrow svg { color: var(--mkt); }

  @media (max-width: 1000px) {
    body { padding: 26px 16px; }
    .stages { display: none; }
    .row { grid-template-columns: 1fr; gap: 8px; margin-bottom: 30px; }
    .arrow { transform: rotate(90deg); height: 28px; }
    .dept { flex-direction: row; }
  }
</style>
</head>
<body>
<div class="wrap">

  <h1>From AI action to <span class="mark">measurable outcome</span></h1>
  <p class="lede">Owl traces every agent action through to the KPI it moved.</p>

  <div class="stages">
    <div class="spacer"></div>
    <div class="sh">Agent</div>
    <div class="spacer"></div>
    <div class="sh">Action</div>
    <div class="spacer"></div>
    <div class="sh">Record</div>
    <div class="spacer"></div>
    <div class="sh kpi">KPI</div>
  </div>

  <!-- R&D lineage -->
  <div class="row rd">
    <div class="dept"><span class="ico">&lt;/&gt;</span><span class="name">R&amp;D</span></div>

    <div class="node">
      <div class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="8" width="16" height="11" rx="2.5"/><path d="M12 8V4M9 4h6"/><circle cx="9" cy="13" r="1.2" fill="currentColor" stroke="none"/><circle cx="15" cy="13" r="1.2" fill="currentColor" stroke="none"/></svg></div>
      <div class="label">AI code-gen agent</div>
    </div>
    <div class="arrow"><svg viewBox="0 0 40 22" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M2 11h34M28 4l8 7-8 7"/></svg></div>

    <div class="node">
      <div class="chip"><img src="https://www.google.com/s2/favicons?domain=github.com&sz=64" alt=""></div>
      <div class="label">Git commit</div>
    </div>
    <div class="arrow"><svg viewBox="0 0 40 22" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M2 11h34M28 4l8 7-8 7"/></svg></div>

    <div class="node">
      <div class="chip"><img src="https://www.google.com/s2/favicons?domain=atlassian.com&sz=64" alt=""></div>
      <div class="label">Linked Jira ticket</div>
    </div>
    <div class="arrow"><svg viewBox="0 0 40 22" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M2 11h34M28 4l8 7-8 7"/></svg></div>

    <div class="node kpi">
      <span class="tag">KPI</span>
      <div class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 13l3.5-3.5M12 5V3M9 3h6"/></svg></div>
      <div class="label">Time-to-ship</div>
    </div>
  </div>

  <!-- Marketing lineage -->
  <div class="row mkt">
    <div class="dept"><span class="ico">📣</span><span class="name">Marketing</span></div>

    <div class="node">
      <div class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2.5"/><path d="M3 9h18M8 3v4M16 3v4"/><circle cx="12" cy="15" r="2.2"/></svg></div>
      <div class="label">Scheduled agent</div>
    </div>
    <div class="arrow"><svg viewBox="0 0 40 22" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M2 11h34M28 4l8 7-8 7"/></svg></div>

    <div class="node">
      <div class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 3L11 13M21 3l-6.5 18-3.5-8-8-3.5L21 3z"/></svg></div>
      <div class="label">Reach-out sent</div>
    </div>
    <div class="arrow"><svg viewBox="0 0 40 22" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M2 11h34M28 4l8 7-8 7"/></svg></div>

    <div class="node">
      <div class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="8" r="3.2"/><path d="M3.5 20c0-3.3 2.9-5.5 6.5-5.5 1.3 0 2.5.3 3.5.8"/><path d="M18 14v6M15 17h6"/></svg></div>
      <div class="label">New lead counted</div>
    </div>
    <div class="arrow"><svg viewBox="0 0 40 22" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M2 11h34M28 4l8 7-8 7"/></svg></div>

    <div class="node kpi">
      <span class="tag">KPI</span>
      <div class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5h18l-7 8v6l-4-2v-4z"/></svg></div>
      <div class="label">Leads generated</div>
    </div>
  </div>

</div>

<script>
  document.querySelectorAll('.chip img').forEach(img => {
    img.addEventListener('error', () => { img.style.display = 'none'; });
  });
</script>
</body>
</html>
